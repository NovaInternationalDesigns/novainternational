[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = """
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'
      https://js.stripe.com
      https://checkout.stripe.com
      https://hcaptcha.com
      https://*.hcaptcha.com;
    connect-src 'self'
      https://api.stripe.com
      https://checkout.stripe.com
      https://js.stripe.com
      https://hcaptcha.com
      https://*.hcaptcha.com;
    frame-src
      https://js.stripe.com
      https://checkout.stripe.com
      https://hooks.stripe.com;
    worker-src 'self' blob:;
    img-src 'self' data:
      https://*.stripe.com
      https://hcaptcha.com
      https://*.hcaptcha.com;
    style-src 'self' 'unsafe-inline';
    font-src 'self' https://fonts.gstatic.com;
    """

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200